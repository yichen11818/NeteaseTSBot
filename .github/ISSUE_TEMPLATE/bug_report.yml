name: Bug report
description: 报告一个可复现的问题或回归
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        提交前请先搜索已有 Issue，并确认内容中不包含 Cookie、Token、服务器地址等敏感信息。
  - type: dropdown
    id: component
    attributes:
      label: 影响范围
      description: 问题主要出现在什么模块？
      options:
        - backend
        - voice-service
        - web
        - deployment / scripts
        - docs
        - other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 版本 / 提交信息
      description: 请填写分支名、commit hash 或版本号
      placeholder: main @ abc1234
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 问题概述
      description: 用 1~3 句话说明问题现象
      placeholder: 例如：Web 控制台切歌后歌词区域仍显示上一首歌曲内容
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请尽量提供稳定、清晰的复现步骤
      placeholder: |
        1. 打开 ...
        2. 点击 ...
        3. 观察 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
      placeholder: 正常情况下应该发生什么？
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      placeholder: 实际发生了什么？是否稳定复现？
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 操作系统、Python / Node / Rust 版本、部署方式等
      placeholder: |
        - OS:
        - Python:
        - Node:
        - Rust:
        - Deployment:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志 / 截图 / 补充信息
      description: 可粘贴脱敏后的日志、报错截图、接口响应等
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，确认不是重复问题
          required: true
        - label: 我已对日志和配置中的敏感信息做脱敏处理
          required: true
