services:
  voice-service:
    build:
      context: .
      dockerfile: Dockerfile.voice-service
    env_file:
      - tsbot.env
    ports:
      - "50051:50051"
    volumes:
      - ./logs:/app/logs

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - tsbot.env
    environment:
      TSBOT_HOST: 0.0.0.0
      TSBOT_PORT: 8009
      TSBOT_VOICE_GRPC_ADDR: voice-service:50051
      DATABASE_URL: sqlite:///./data/tsbot.db
    depends_on:
      - voice-service
    ports:
      - "8009:8009"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file:
      - tsbot.env
    environment:
      VITE_DEV_HOST: 0.0.0.0
      VITE_DEV_PORT: 5173
      VITE_API_BASE: http://127.0.0.1:8009
    depends_on:
      - backend
    ports:
      - "5173:5173"
